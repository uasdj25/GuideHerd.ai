# GuideHerd Academy — Cloudflare Pages local dev config
# Used by: wrangler pages dev
# NOT used by production Cloudflare Pages deployments — configure bindings in the dashboard.

name = "guideherd-academy"
pages_build_output_dir = "."
compatibility_date = "2024-12-18"

[[d1_databases]]
binding = "DB"
database_name = "guideherd-academy-db"
database_id = "REPLACE_WITH_REAL_DATABASE_ID"
